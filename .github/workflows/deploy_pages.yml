name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}
  workflow_call: {} # Allows calling from update_news.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build finance dashboard
        run: npm ci --prefix finance-dashboard && npm run build --prefix finance-dashboard
      - name: Prepare finance dashboard deploy files
        run: rm -rf finance-dashboard/assets && cp finance-dashboard/dist/index.html finance-dashboard/index.html && mkdir -p finance-dashboard/assets && cp -R finance-dashboard/dist/assets/. finance-dashboard/assets/
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
