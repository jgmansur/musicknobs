name: Daily Copyright News Update

on:
  schedule:
    # Runs at 12:00 UTC (around 6-8 AM in the Americas) every day
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  update-news:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Needed to commit the updated data.json

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm init -y && npm install groq-sdk node-fetch

      - name: Fetch and Update News (via AI)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node .github/scripts/fetch_news.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add noticias/data.json
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: Automated daily copyright news update" && git push)

  # Call the deployment workflow explicitly since the GITHUB_TOKEN push won't trigger it
  deploy:
    needs: update-news
    uses: ./.github/workflows/deploy_pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write
