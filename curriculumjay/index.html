
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jay Mansur - Curriculum Vitae</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f1ea;
            --paper-color: #ffffff;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --accent-color: #9c8b52;
            --border-color: #e0dcd3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .paper {
            background-color: var(--paper-color);
            max-width: 900px;
            width: 100%;
            padding: 60px 80px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 40px;
        }

        .profile-pic {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            margin: 0 auto 25px;
            border: 1px solid var(--accent-color);
            padding: 4px;
            background: white;
            display: block;
            object-fit: cover;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            color: #1a1a1a;
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.1rem;
            color: var(--accent-color);
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .btn {
            padding: 6px 18px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: #1a1a1a;
            border-bottom: 1px solid var(--border-color);
            margin: 35px 0 18px;
            padding-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cv-text {
            font-family: 'Lora', serif;
            font-size: 1.05rem;
            color: var(--text-main);
            text-align: justify;
        }

        .cv-text h3 {
            font-family: 'Playfair Display', serif;
            margin: 22px 0 8px;
            font-size: 1.2rem;
            color: #333;
        }

        .cv-text ul {
            margin-left: 20px;
            margin-bottom: 18px;
        }

        .cv-text p {
            margin-bottom: 15px;
        }

        .cv-text strong {
            color: #000;
            font-weight: 600;
        }

        footer {
            margin-top: 50px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            padding-top: 25px;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .paper {
                padding: 40px 25px;
            }
            h1 {
                font-size: 2rem;
            }
        }

        @media print {
            body { background: white; padding: 0; }
            .paper { box-shadow: none; border: none; padding: 0; }
            .controls { display: none; }
        }
    </style>
</head>
<body>
    <div class="paper">
        <header>
            <img src="https://i.ibb.co/3W6pZ0d/profile.jpg" alt="Jay Mansur" class="profile-pic">
            <h1>Jay Mansur</h1>
            <p class="subtitle">Senior Architect & Tech Leader</p>
            <div class="controls">
                <a href="index-en.html" class="btn">English Vision</a>
                <a href="https://linktr.ee/musicknobs" class="btn">Linktree</a>
            </div>
        </header>

        <div class="content">
            <div class="cv-text">
                <p>/Users/jaystudio/jay_mansur_cv_formateado.md</p>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 Jay Mansur - Premium Formal Curriculum</p>
        </footer>
    </div>
</body>
</html>
