<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Parenting Scoreboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para procesar JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            overscroll-behavior-y: contain;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .btn-press:active { transform: scale(0.95); transition: 0.1s; }
        .modal-overlay { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); }
        input:focus { font-size: 16px !important; } 
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- CONFIGURACIÓN ---
        const CONFIG = {
            MARIEL_EMAIL: "marieldelarosaguajardo@gmail.com", 
            JAY_EMAIL: "jgmansur2@gmail.com"        
        };

        const firebaseConfig = {
            apiKey: "AIzaSyDzvIYtTwOmxN35qBLQG8JimAXhDghK5ys",
            authDomain: "parentingscoreboard.firebaseapp.com",
            projectId: "parentingscoreboard",
            storageBucket: "parentingscoreboard.firebasestorage.app",
            messagingSenderId: "1097939648812",
            appId: "1:1097939648812:web:0565072a1c55ed8ae3ac89"
        };

        // Inicialización segura
        let auth, db, provider;
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            auth = firebase.auth();
            db = firebase.firestore();
            provider = new firebase.auth.GoogleAuthProvider();
        } catch (e) {
            console.error("Firebase init error:", e);
        }

        const appId = 'parenting-scoreboard-pro';

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i ref={iconRef} data-lucide={name} className={className}></i>;
        };

        const DEFAULT_TASKS = [
            { label: 'Cenar/Comer fuera (Familia)', points: 30, icon: 'utensils' },
            { label: 'Llevarlos de Vacaciones', points: 30, icon: 'plane' },
            { label: 'Llevarlos de Camping', points: 30, icon: 'tent' },
            { label: 'Llevarlos a la Alberca', points: 30, icon: 'waves' },
            { label: 'Sacar niños a entretenerse', points: 20, icon: 'heart' },
            { label: 'Llevarlos al Dentista', points: 20, icon: 'stethoscope' },
            { label: 'Cita Médica / Especialista', points: 20, icon: 'stethoscope' },
            { label: 'Bañar a los perros', points: 17, icon: 'dog' },
            { label: 'Decidir qué se va a comer', points: 15, icon: 'clipboard-list' },
            { label: 'Ir al Super', points: 15, icon: 'shopping-cart' },
            { label: 'Deporte / Entreno (Quedarse)', points: 15, icon: 'timer' },
            { label: 'Ayudar con Tareas Escolares', points: 15, icon: 'book-open' },
            { label: 'Llevar/Recoger Escuela', points: 15, icon: 'car' },
            { label: 'Preparar Cena', points: 12, icon: 'utensils-crosses' },
            { label: 'Preparar Desayuno', points: 12, icon: 'coffee' },
            { label: 'Preparar Lunch', points: 12, icon: 'briefcase' },
            { label: 'Dar medicinas', points: 10, icon: 'pill' },
            { label: 'Llevarlos a terapia', points: 10, icon: 'brain' },
            { label: 'Baño/Pijama/Dientes', points: 10, icon: 'baby' },
            { label: 'Comprar comida perros', points: 10, icon: 'bone' },
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [profileName, setProfileName] = useState("");
            const [logs, setLogs] = useState([]);
            const [availableTasks, setAvailableTasks] = useState([]);
            const [isAddingLog, setIsAddingLog] = useState(false);
            const [isManagingTasks, setIsManagingTasks] = useState(false);
            const [isEditingTask, setIsEditingTask] = useState(null);
            const [loading, setLoading] = useState(true);
            const [jointTask, setJointTask] = useState(false);
            const [searchTerm, setSearchTerm] = useState("");
            const [error, setError] = useState(null);
            
            const searchInputRef = useRef(null);

            // 1. Auth Listener
            useEffect(() => {
                if (!auth) return;
                const unsubscribe = auth.onAuthStateChanged((currentUser) => {
                    try {
                        if (currentUser) {
                            const email = currentUser.email.toLowerCase();
                            if (email === CONFIG.MARIEL_EMAIL.toLowerCase()) setProfileName("Mariel");
                            else if (email === CONFIG.JAY_EMAIL.toLowerCase()) setProfileName("Jay");
                            else setProfileName(currentUser.displayName?.split(' ')[0] || "Invitado");
                            setUser(currentUser);
                        } else {
                            setUser(null);
                        }
                    } catch (err) {
                        setError("Error en sesión: " + err.message);
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // 2. Data Listeners
            useEffect(() => {
                if (!user || !db) return;
                
                const rootRef = db.collection('artifacts').doc(appId).collection('public').doc('data');
                const logsRef = rootRef.collection('parent_logs');
                const tasksRef = rootRef.collection('task_definitions');

                const unsubLogs = logsRef.onSnapshot((snapshot) => {
                    const data = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data(),
                        date: doc.data().timestamp?.toDate() || new Date()
                    }));
                    const now = new Date();
                    const filtered = data
                        .filter(log => {
                            const logDate = new Date(log.date);
                            return logDate.getMonth() === now.getMonth() && logDate.getFullYear() === now.getFullYear();
                        })
                        .sort((a, b) => b.date - a.date);
                    setLogs(filtered);
                }, (err) => setError("Error cargando actividad: " + err.message));

                const unsubTasks = tasksRef.onSnapshot((snapshot) => {
                    if (snapshot.empty) {
                        DEFAULT_TASKS.forEach(t => tasksRef.add(t));
                    } else {
                        const tasks = snapshot.docs.map(doc => ({
                            id: doc.id,
                            ...doc.data()
                        })).sort((a, b) => b.points - a.points);
                        setAvailableTasks(tasks);
                    }
                }, (err) => setError("Error cargando acciones: " + err.message));

                return () => { unsubLogs(); unsubTasks(); };
            }, [user]);

            useEffect(() => {
                if (isAddingLog && searchInputRef.current) {
                    setTimeout(() => searchInputRef.current.focus(), 300);
                } else {
                    setSearchTerm("");
                }
            }, [isAddingLog]);

            const login = async () => {
                try { await auth.signInWithPopup(provider); } 
                catch (error) { setError("Error al entrar con Google."); }
            };

            const logout = () => auth.signOut();

            const scores = useMemo(() => {
                const totals = { Mariel: 0, Jay: 0 };
                logs.forEach(log => {
                    if (log.userName === 'Mariel') totals.Mariel += log.points;
                    else if (log.userName === 'Jay') totals.Jay += log.points;
                });
                return totals;
            }, [logs]);

            const filteredTasks = useMemo(() => {
                return availableTasks.filter(task => 
                    task.label.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }, [availableTasks, searchTerm]);

            const totalPoints = scores.Mariel + scores.Jay;
            const marielPct = totalPoints === 0 ? 50 : (scores.Mariel / totalPoints) * 100;
            const jayPct = totalPoints === 0 ? 50 : (scores.Jay / totalPoints) * 100;

            const handleAddLog = async (task) => {
                if (!user) return;
                const logsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('parent_logs');
                try {
                    if (jointTask) {
                        const halfPoints = task.points / 2;
                        for (const pName of ["Mariel", "Jay"]) {
                            await logsRef.add({
                                userName: pName,
                                userId: user.uid,
                                taskLabel: `${task.label} (Juntos)`,
                                points: halfPoints,
                                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                            });
                        }
                    } else {
                        await logsRef.add({
                            userName: profileName,
                            userId: user.uid,
                            taskLabel: task.label,
                            points: task.points,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        });
                    }
                    setIsAddingLog(false);
                    setJointTask(false);
                } catch (err) { console.error(err); }
            };

            const handleDeleteLog = async (logId, logUserId) => {
                if (user.uid !== logUserId) return;
                try { await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('parent_logs').doc(logId).delete(); } 
                catch (err) { console.error(err); }
            };

            const saveTaskDefinition = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const taskData = {
                    label: formData.get('label'),
                    points: parseInt(formData.get('points')),
                    icon: formData.get('icon') || 'check-circle'
                };
                const tasksRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('task_definitions');
                try {
                    if (isEditingTask?.id) await tasksRef.doc(isEditingTask.id).update(taskData);
                    else await tasksRef.add(taskData);
                    setIsEditingTask(null);
                } catch (err) { console.error(err); }
            };

            const deleteTaskDefinition = async (id) => {
                try { await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('task_definitions').doc(id).delete(); } 
                catch (err) { console.error(err); }
            };

            if (error) return (
                <div className="min-h-screen flex items-center justify-center p-8 bg-red-50">
                    <div className="bg-white p-6 rounded-3xl shadow-xl border border-red-100 text-center">
                        <Icon name="alert-circle" className="w-12 h-12 text-red-500 mx-auto mb-4" />
                        <h2 className="text-xl font-bold text-red-900 mb-2">Algo salió mal</h2>
                        <p className="text-red-700 text-sm mb-6">{error}</p>
                        <button onClick={() => window.location.reload()} className="bg-red-600 text-white px-6 py-3 rounded-2xl font-bold">Reintentar</button>
                    </div>
                </div>
            );

            if (loading) return (
                <div className="flex flex-col items-center justify-center h-screen bg-white">
                    <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                    <p className="mt-4 text-slate-400 font-bold uppercase tracking-widest text-[10px]">Sincronizando...</p>
                </div>
            );

            if (!user) return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6">
                    <div className="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100 flex flex-col items-center w-full max-w-sm">
                        <div className="w-20 h-20 bg-indigo-50 rounded-3xl flex items-center justify-center mb-6">
                            <Icon name="shield-check" className="w-10 h-10 text-indigo-600" />
                        </div>
                        <h1 className="text-3xl font-black text-slate-800 text-center mb-2 leading-none">Scoreboard</h1>
                        <p className="text-slate-400 text-center mb-10 text-sm leading-relaxed">Tu sesión se mantendrá activa.</p>
                        <button onClick={login} className="w-full bg-indigo-600 text-white font-bold py-5 rounded-3xl flex items-center justify-center gap-3 btn-press shadow-xl shadow-indigo-100">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-6 h-6 brightness-0 invert" alt="Google" />
                            Iniciar sesión
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center">
                    <div className="w-full max-w-md bg-slate-50 min-h-screen relative pb-32">
                        {/* Header Fixed */}
                        <div className="sticky top-0 bg-white/95 backdrop-blur-md z-10 px-6 pt-12 pb-6 rounded-b-[3rem] shadow-sm border-b border-slate-100">
                            <div className="flex justify-between items-center mb-6">
                                <div className="flex items-center gap-2">
                                    <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold italic">S</div>
                                    <span className="font-black text-slate-800 text-lg tracking-tight">Parenting Score</span>
                                </div>
                                <div className="flex items-center gap-1">
                                    <button onClick={() => setIsManagingTasks(true)} className="p-2 text-slate-400 hover:text-indigo-600"><Icon name="settings" className="w-5 h-5" /></button>
                                    <button onClick={logout} className="p-2 text-slate-300 hover:text-red-500"><Icon name="log-out" className="w-5 h-5" /></button>
                                </div>
                            </div>
                            <div className="flex justify-between items-end mb-6">
                                <div className="flex-1 text-center">
                                    <p className="text-[10px] font-black uppercase text-pink-500 mb-1">Mariel</p>
                                    <p className="text-4xl font-black text-slate-800 leading-none">{scores.Mariel}</p>
                                </div>
                                <div className="px-4 text-center"><Icon name="trophy" className="w-6 h-6 text-yellow-500 mx-auto" /></div>
                                <div className="flex-1 text-center">
                                    <p className="text-[10px] font-black uppercase text-blue-400 mb-1">Jay</p>
                                    <p className="text-4xl font-black text-slate-800 leading-none">{scores.Jay}</p>
                                </div>
                            </div>
                            <div className="relative w-full h-7 bg-slate-100 rounded-full overflow-hidden flex border-2 border-white shadow-inner">
                                <div className="h-full bg-pink-500 transition-all duration-1000" style={{ width: `${marielPct}%` }} />
                                <div className="h-full bg-blue-500 transition-all duration-1000" style={{ width: `${jayPct}%` }} />
                            </div>
                        </div>

                        {/* Logs */}
                        <div className="p-6">
                            <h2 className="text-xl font-black text-slate-800 mb-6">Actividad Reciente</h2>
                            {logs.length === 0 ? (
                                <div className="bg-white rounded-[2.5rem] p-12 text-center border-2 border-dashed border-slate-100">
                                    <p className="text-slate-400 font-bold italic text-sm">Sin registros.</p>
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    {logs.map(log => (
                                        <div key={log.id} className={`bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex items-center gap-4 border-l-4 ${log.userName === 'Mariel' ? 'border-l-pink-400' : 'border-l-blue-400'}`}>
                                            <div className={`w-11 h-11 rounded-2xl flex items-center justify-center ${log.userName === 'Mariel' ? 'bg-pink-50 text-pink-500' : 'bg-blue-50 text-blue-500'}`}>
                                                <Icon name={availableTasks.find(t => t.label === log.taskLabel.replace(' (Juntos)', ''))?.icon || 'check-circle'} className="w-5 h-5" />
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <div className="flex justify-between items-start">
                                                    <h3 className="font-bold text-slate-800 text-[13px] truncate">{log.taskLabel}</h3>
                                                    <span className={`text-xs font-black ${log.userName === 'Mariel' ? 'text-pink-600' : 'text-blue-600'}`}>+{log.points}</span>
                                                </div>
                                                <div className="flex justify-between items-center mt-1">
                                                    <p className="text-[10px] text-slate-400 uppercase font-bold">
                                                        {log.userName} • {log.date.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })}
                                                    </p>
                                                    {log.userId === user?.uid && (
                                                        <button onClick={() => handleDeleteLog(log.id, log.userId)} className="text-slate-200"><Icon name="trash-2" className="w-4 h-4" /></button>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Botón Flotante */}
                        {!isAddingLog && !isManagingTasks && (
                            <button onClick={() => setIsAddingLog(true)} className="fixed bottom-10 left-1/2 -translate-x-1/2 w-16 h-16 bg-indigo-600 text-white rounded-3xl shadow-2xl flex items-center justify-center btn-press border-b-4 border-indigo-800 z-20">
                                <Icon name="plus" className="w-9 h-9" />
                            </button>
                        )}

                        {/* MODAL REGISTRO */}
                        {isAddingLog && (
                            <div className="fixed inset-0 modal-overlay z-50 flex items-end justify-center">
                                <div className="bg-white w-full max-w-md rounded-t-[3.5rem] p-8 pb-12 animate-in slide-in-from-bottom duration-300 flex flex-col max-h-[92vh]">
                                    <div className="flex justify-between items-start mb-6">
                                        <h2 className="text-2xl font-black text-slate-800 leading-none">Registrar</h2>
                                        <button onClick={() => setIsAddingLog(false)} className="text-slate-400 p-2">&times;</button>
                                    </div>
                                    <div className="mb-4 relative">
                                        <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="search" className="w-4 h-4" /></div>
                                        <input 
                                            ref={searchInputRef}
                                            type="text"
                                            placeholder="Buscar tarea..."
                                            className="w-full bg-slate-100 p-4 pl-12 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none font-medium"
                                            value={searchTerm}
                                            onChange={(e) => setSearchTerm(e.target.value)}
                                        />
                                    </div>
                                    <div className="mb-6 p-5 bg-indigo-50 rounded-[2rem] flex items-center justify-between border border-indigo-100">
                                        <div className="flex items-center gap-3">
                                            <Icon name="users" className="text-indigo-600" />
                                            <span className="text-sm font-black text-indigo-900">¿Lo hicimos juntos?</span>
                                        </div>
                                        <button onClick={() => setJointTask(!jointTask)} className={`w-14 h-8 rounded-full relative flex items-center px-1 ${jointTask ? 'bg-indigo-600' : 'bg-slate-300'}`}>
                                            <div className={`w-6 h-6 bg-white rounded-full transition-all ${jointTask ? 'translate-x-6' : ''}`} />
                                        </button>
                                    </div>
                                    <div className="overflow-y-auto flex-1 custom-scrollbar pb-6 space-y-2">
                                        {filteredTasks.map(task => (
                                            <button key={task.id} onClick={() => handleAddLog(task)} className="w-full flex items-center gap-4 p-5 bg-slate-50 border border-slate-100 rounded-[2rem] btn-press text-left">
                                                <div className="text-indigo-600 bg-white p-3 rounded-2xl"><Icon name={task.icon} /></div>
                                                <div className="flex-1">
                                                    <p className="font-bold text-slate-800 text-sm">{task.label}</p>
                                                    <p className="text-[10px] font-black text-indigo-400 uppercase">{jointTask ? task.points/2 : task.points} PUNTOS</p>
                                                </div>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* MODAL CONFIGURACIÓN */}
                        {isManagingTasks && (
                            <div className="fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
                                <div className="bg-white w-full max-w-md rounded-[3rem] p-8 shadow-2xl flex flex-col max-h-[85vh]">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-2xl font-black text-slate-800 tracking-tight">Acciones</h2>
                                        <button onClick={() => setIsManagingTasks(false)} className="text-slate-400 p-2">&times;</button>
                                    </div>
                                    <button onClick={() => setIsEditingTask({ label: '', points: 10, icon: 'check-circle' })} className="w-full mb-6 p-5 bg-indigo-600 text-white font-bold rounded-3xl btn-press flex items-center justify-center gap-2">
                                        <Icon name="plus-circle" /> Nueva Acción
                                    </button>
                                    <div className="overflow-y-auto custom-scrollbar flex-1 space-y-2">
                                        {availableTasks.map(task => (
                                            <div key={task.id} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                                <div className="flex items-center gap-3">
                                                    <Icon name={task.icon} className="text-slate-400 w-4 h-4" />
                                                    <span className="font-bold text-slate-800 text-sm">{task.label} ({task.points}p)</span>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => setIsEditingTask(task)} className="p-2 text-indigo-400"><Icon name="edit-2" className="w-4 h-4" /></button>
                                                    <button onClick={() => deleteTaskDefinition(task.id)} className="p-2 text-red-300"><Icon name="trash-2" className="w-4 h-4" /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* MODAL EDITAR TAREA */}
                        {isEditingTask && (
                            <div className="fixed inset-0 modal-overlay z-[60] flex items-center justify-center p-6">
                                <div className="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl">
                                    <h3 className="text-xl font-black text-slate-800 mb-6">{isEditingTask.id ? 'Editar' : 'Nueva'} Acción</h3>
                                    <form onSubmit={saveTaskDefinition} className="space-y-4">
                                        <input name="label" defaultValue={isEditingTask.label} required className="w-full bg-slate-50 p-4 rounded-2xl outline-none font-bold" placeholder="Nombre" />
                                        <input name="points" type="number" defaultValue={isEditingTask.points} required className="w-full bg-slate-50 p-4 rounded-2xl outline-none font-bold" placeholder="Puntos" />
                                        <input name="icon" defaultValue={isEditingTask.icon} className="w-full bg-slate-50 p-4 rounded-2xl outline-none font-bold" placeholder="Icono (car, dog, etc)" />
                                        <div className="flex gap-3 pt-4">
                                            <button type="button" onClick={() => setIsEditingTask(null)} className="flex-1 font-bold text-slate-400">Cerrar</button>
                                            <button type="submit" className="flex-1 p-4 bg-indigo-600 text-white font-bold rounded-2xl btn-press">Guardar</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
