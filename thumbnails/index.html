<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thumbnail Labs | MusicKnobs</title>
    <!-- Fonts: Inter, Outfit, Montserrat, Bebas Neue, Archivo Black -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@700;800;900&family=Oswald:wght@700&family=Outfit:wght@400;600;800&family=Poppins:wght@700;800;900&family=Roboto:wght@700;900&family=Teko:wght@600;700&family=Rubik:wght@700;900&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css"> <!-- Base styles -->
    <link rel="stylesheet" href="style.css"> <!-- Specific app styles -->
</head>

<body>
    <!-- Background Elements -->
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <header class="header">
        <div class="container header-container">
            <a href="../" class="logo-link">
                <!-- Fallback to parent text if logo fails locally -->
                <span
                    style="font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.5rem; color: white;">MusicKnobs
                    <span style="color: var(--primary-color);">Labs</span></span>
            </a>
            <div class="app-title">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Thumbnail Generator
            </div>
        </div>
    </header>

    <main class="app-container">
        <!-- LEFT PANEL: IA PROMPT BUILDER -->
        <section class="panel prompt-panel glass-panel">
            <h2><i class="fa-solid fa-robot"></i> 1. Generador de Fondo (IA)</h2>
            <p class="panel-desc">Crea el prompt perfecto para Midjourney/DALL-E basado en tu manual de estrategia.</p>

            <form id="prompt-form" class="controls-form">
                <div class="form-group">
                    <label for="arquetipo">Arquetipo Visual</label>
                    <select id="arquetipo">
                        <option value="comparativa">A. Cara a Cara (Comparativa VS)</option>
                        <option value="tutorial">B. Deep Dive (Tutorial Técnico)</option>
                        <option value="noticias">C. Análisis de Crisis (Noticias)</option>
                        <option value="general">D. Sujeto General (Vlog/Review)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="sujeto">Expresión del Sujeto</label>
                    <select id="sujeto">
                        <option value="intense, analytical expression">Analítica / Intensa</option>
                        <option value="shocked, surprised expression">Sorprendido / Shock</option>
                        <option value="concerned, deep analysis expression">Preocupado / Serio (Crisis)</option>
                        <option value="happy, engaging expression, gesturing">Emocionado / Explicando</option>
                        <option value="no subject">Sin Sujeto Humano</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="entorno">Entorno / Background</label>
                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                        <select id="entorno">
                            <option value="dark high-end recording studio">Dark high-end recording studio</option>
                            <option value="vintage analog mixing console with glowing VU meters">Vintage analog mixing
                                console</option>
                            <option value="modern minimalist producer desk with massive studio monitors">Modern
                                minimalist producer desk</option>
                            <option value="neon lit cyberpunk beatmaking station">Neon lit cyberpunk beatmaking station
                            </option>
                            <option value="acoustic treated vocal booth with vintage condenser microphone">Acoustic
                                treated vocal booth</option>
                            <option value="live concert stage with cinematic lighting rig">Live concert stage</option>
                            <option value="lo-fi beatmaker bedroom studio with warm sunlight">Lo-fi beatmaker bedroom
                            </option>
                            <option value="stadium EDM festival stage from DJ perspective">Stadium EDM festival stage
                            </option>
                            <option value="orchestral scoring stage with grand piano">Orchestral scoring stage</option>
                            <option value="home studio setup with RGB lighting and synthesizers">Home studio setup
                            </option>
                            <option value="custom">-- Escribir uno propio --</option>
                        </select>
                        <input type="text" id="entorno-custom" style="display: none;"
                            placeholder="Escribe tu propio entorno aquí...">
                    </div>
                </div>

                <div class="form-group">
                    <label for="iluminacion">Acentos de Color (Luces LED)</label>
                    <select id="iluminacion">
                        <option value="Neon Cyberpunk accents (Cyan and Magenta)">Cyan y Magenta (Tech/Moderno)</option>
                        <option value="Warm Analog glow (Amber and Rust orange)">Ámbar y Naranja (Analógico/Cálido)
                        </option>
                        <option value="Harsh Red and Dark accents">Rojo y Oscuro (Crisis/Peligro)</option>
                    </select>
                </div>
            </form>

            <div class="prompt-result-container">
                <label>Prompt Generado (Cópialo en tu IA):</label>
                <textarea id="generated-prompt" readonly rows="7"></textarea>
                <button id="copy-prompt-btn" class="btn-secondary"><i class="fa-regular fa-copy"></i> Copiar
                    Prompt</button>
            </div>
        </section>

        <!-- RIGHT PANEL: TEXT OVERLAY & CANVAS -->
        <section class="panel canvas-panel glass-panel">
            <h2><i class="fa-solid fa-text-height"></i> 2. Texto y Ensamblaje</h2>
            <p class="panel-desc">Sube la imagen que te dio la IA y agrégale los textos ganadores. Arrastra el texto en
                el lienzo para acomodarlo.</p>

            <div class="canvas-controls">
                <div class="upload-area" id="upload-area">
                    <input type="file" id="image-upload" accept="image/png, image/jpeg, image/webp" hidden>
                    <label for="image-upload" class="upload-label">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <span>Sube tu fondo generado por IA (1280x720)</span>
                    </label>
                </div>

                <div class="text-tools" id="text-tools" style="display: none;">
                    <div class="form-inline">
                        <input type="text" id="thumb-text-1" placeholder="Ej: THE ALGORITHM" maxlength="15">
                        <input type="color" id="color-1" value="#FFFFFF">
                        <input type="range" id="size-1" min="50" max="250" value="130" title="Tamaño de texto 1"
                            style="width: 70px;">
                    </div>
                    <div class="form-inline">
                        <input type="text" id="thumb-text-2" placeholder="Ej: IS DEAD" maxlength="15">
                        <input type="color" id="color-2" value="#FF3366">
                        <input type="range" id="size-2" min="50" max="250" value="130" title="Tamaño de texto 2"
                            style="width: 70px;">
                    </div>

                    <div class="style-controls">
                        <select id="font-family">
                            <option value="Montserrat">Montserrat (Moderno)</option>
                            <option value="Oswald">Oswald (Alto y Elegante)</option>
                            <option value="Poppins">Poppins (Redondo / Amigable)</option>
                            <option value="Roboto">Roboto (Clásico / Limpio)</option>
                            <option value="Teko">Teko (Cuadrado / Impactante)</option>
                            <option value="Rubik">Rubik (Grueso / Suave)</option>
                        </select>
                        <button id="add-vs-btn" class="btn-micro" title="Añade gráfico VS al centro">Añadir
                            "VS"</button>
                    </div>

                    <div class="style-controls-advanced"
                        style="display: flex; gap: 1rem; align-items: center; justify-content: space-between; border-top: 1px solid var(--panel-border); padding-top: 1rem; font-size: 0.85rem; color: var(--text-muted);">
                        <label style="display: flex; flex-direction: column; gap: 0.3rem;">Separación: <input
                                type="range" id="letter-spacing" min="-5" max="30" value="0"
                                style="width: 80px;"></label>
                        <label style="display: flex; align-items: center; gap: 0.3rem; cursor: pointer;"><input
                                type="checkbox" id="toggle-shadow" checked> Sombra</label>
                        <label style="display: flex; align-items: center; gap: 0.3rem; cursor: pointer;"><input
                                type="checkbox" id="toggle-stroke" checked> Delineado</label>
                    </div>
                </div>
            </div>

            <!-- The actual creative boundary -->
            <div class="canvas-wrapper">
                <canvas id="thumbnail-canvas" width="1280" height="720"></canvas>
            </div>

            <div class="export-controls">
                <button id="download-btn" class="btn-primary" disabled><i class="fa-solid fa-download"></i> Descargar
                    Thumbnail (HD)</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
